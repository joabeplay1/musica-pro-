<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Ball Pool PRO MAX</title>

<style>
:root{
    --felt:#0a5c36;
    --wood:#3b2a1d;
    --bg:#050505;
    --neon:#00ff88;
}

body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

#hud{
    width:95%;
    max-width:1100px;
    display:flex;
    justify-content:space-between;
    margin:10px;
    background:#111;
    padding:10px;
    border-radius:10px;
}

.active{
    border:2px solid var(--neon);
}

#tableBox{
    background:var(--wood);
    padding:20px;
    border-radius:15px;
}

canvas{
    background:var(--felt);
    border-radius:8px;
}
</style>
</head>

<body>

<div id="hud">
    <div id="p1" class="active">👤 JOABE</div>
    <div>VS</div>
    <div id="p2">🤖 BOT</div>
</div>

<div id="tableBox">
    <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
    W = Math.min(window.innerWidth*0.95,1200);
    H = W/2;
    canvas.width=W;
    canvas.height=H;
}
resize();
window.addEventListener("resize",resize);

const FRICTION=0.985;
const R = W*0.015;

let balls=[];
let turn=1;
let state="aim";

class Ball{
    constructor(x,y,color,n,type){
        this.x=x;this.y=y;
        this.vx=0;this.vy=0;
        this.color=color;
        this.n=n;
        this.type=type;
        this.in=false;
    }
    draw(){
        if(this.in) return;

        ctx.beginPath();
        ctx.arc(this.x,this.y,R,0,Math.PI*2);
        ctx.fillStyle=this.color;
        ctx.fill();

        if(this.type!="white"){
            ctx.fillStyle="#fff";
            ctx.font=R+"px Arial";
            ctx.textAlign="center";
            ctx.textBaseline="middle";
            ctx.fillText(this.n,this.x,this.y);
        }
    }
    update(){
        if(this.in) return;

        this.x+=this.vx;
        this.y+=this.vy;

        this.vx*=FRICTION;
        this.vy*=FRICTION;

        if(Math.abs(this.vx)<0.05)this.vx=0;
        if(Math.abs(this.vy)<0.05)this.vy=0;

        if(this.x<R||this.x>W-R) this.vx*=-0.8;
        if(this.y<R||this.y>H-R) this.vy*=-0.8;

        checkPocket(this);
    }
}

function checkPocket(b){
    const holes=[
        [0,0],[W/2,0],[W,0],
        [0,H],[W/2,H],[W,H]
    ];

    holes.forEach(h=>{
        let d=Math.hypot(b.x-h[0],b.y-h[1]);
        if(d<25){
            b.in=true;

            // REGRAS
            if(b.type==="white"){
                alert("FALTA!");
                resetWhite();
            }

            if(b.type==="black"){
                alert(turn===1?"VOCÊ GANHOU":"BOT GANHOU");
                setup();
            }
        }
    });
}

function resetWhite(){
    let w=balls[0];
    w.in=false;
    w.x=W*0.3;
    w.y=H/2;
    w.vx=0;w.vy=0;
}

function setup(){
    balls=[];

    balls.push(new Ball(W*0.3,H/2,"#fff",0,"white"));

    let colors=["yellow","blue","red","purple","orange","green","brown"];
    let n=1;

    for(let i=0;i<5;i++){
        for(let j=0;j<=i;j++){
            let x=W*0.7+i*R*2;
            let y=H/2+(j-i/2)*R*2;

            let type=n<=7?"solid":(n==8?"black":"stripe");
            let c=n==8?"black":colors[(n-1)%7];

            balls.push(new Ball(x,y,c,n,type));
            n++;
        }
    }
}
setup();

function collide(){
    for(let i=0;i<balls.length;i++){
        for(let j=i+1;j<balls.length;j++){
            let a=balls[i],b=balls[j];
            if(a.in||b.in) continue;

            let dx=b.x-a.x;
            let dy=b.y-a.y;
            let d=Math.hypot(dx,dy);

            if(d<R*2){
                let angle=Math.atan2(dy,dx);
                let force=0.5;

                a.vx-=Math.cos(angle)*force;
                a.vy-=Math.sin(angle)*force;

                b.vx+=Math.cos(angle)*force;
                b.vy+=Math.sin(angle)*force;
            }
        }
    }
}

let mouse={x:0,y:0};
canvas.addEventListener("mousemove",e=>{
    let r=canvas.getBoundingClientRect();
    mouse.x=e.clientX-r.left;
    mouse.y=e.clientY-r.top;
});

let power=0;
let charging=false;

canvas.addEventListener("mousedown",()=>{
    if(state==="aim"&&turn===1) charging=true;
});

canvas.addEventListener("mouseup",()=>{
    if(charging){
        let w=balls[0];
        let a=Math.atan2(mouse.y-w.y,mouse.x-w.x);

        w.vx=Math.cos(a)*power/5;
        w.vy=Math.sin(a)*power/5;

        charging=false;
        power=0;
        state="move";
    }
});

function drawAim(){
    let w=balls[0];
    let a=Math.atan2(mouse.y-w.y,mouse.x-w.x);

    ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.moveTo(w.x,w.y);
    ctx.lineTo(w.x+Math.cos(a)*1000,w.y+Math.sin(a)*1000);
    ctx.strokeStyle="rgba(255,255,255,0.3)";
    ctx.stroke();
    ctx.setLineDash([]);
}

function bot(){
    let w=balls[0];
    let target=balls.find(b=>!b.in&&b.type!=="white"&&b.type!=="black");

    if(!target) return;

    let a=Math.atan2(target.y-w.y,target.x-w.x);

    w.vx=Math.cos(a)*8;
    w.vy=Math.sin(a)*8;

    state="move";
}

function loop(){
    ctx.clearRect(0,0,W,H);

    collide();

    let moving=false;

    balls.forEach(b=>{
        b.update();
        b.draw();
        if(b.vx||b.vy) moving=true;
    });

    if(state==="aim"&&turn===1) drawAim();

    if(!moving && state==="move"){
        state="aim";
        turn = turn===1?2:1;

        document.getElementById("p1").className = turn===1?"active":"";
        document.getElementById("p2").className = turn===2?"active":"";

        if(turn===2) setTimeout(bot,800);
    }

    if(charging){
        power=Math.min(power+2,100);
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
