<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesus Reina - Player Local</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS: Estilos e Cores (Mantidos) --- */
        :root {
            --bg-body: #111111;
            --bg-card: #1a1a1a;
            --bg-modal: #222222;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --purple-main: #7e3ef8;
            --purple-hover: #9c68f7;
            --border-radius-main: 12px;
            --border-radius-btn: 5px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .app-container { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background-color: var(--bg-body);
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: bold; margin-bottom: 40px; }
        .logo i { color: var(--purple-main); }

        .main-nav ul { list-style: none; display: flex; flex-direction: column; gap: 15px; }
        .main-nav a { text-decoration: none; color: var(--text-muted); display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .main-nav a:hover { color: var(--text-main); }

        .add-btn-sidebar {
            background: none; border: none; color: var(--text-muted); font-size: 1rem; 
            text-align: left; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 15px;
        }

        /* CONTEÚDO */
        .content { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; }

        .search-bar {
            display: flex; align-items: center; background-color: #1a1a1a;
            border-radius: 20px; padding: 5px 15px; width: 300px; margin-bottom: 30px;
        }
        .search-bar input { background: none; border: none; color: white; padding-left: 10px; width: 100%; outline: none; }

        .lista-musicas { background-color: var(--bg-card); border-radius: var(--border-radius-main); padding: 20px; min-height: 150px; }
        .lista-musicas ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .lista-musicas li {
            padding: 10px 15px; background-color: #222; border-radius: 5px; cursor: pointer;
            display: flex; align-items: center; gap: 15px;
        }
        .lista-musicas li:hover { background-color: #333; }
        .lista-musicas li.tocando { border-left: 4px solid var(--purple-main); background-color: #282828; }

        /* FOOTER PLAYER */
        .footer-player {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background-color: rgba(17, 17, 17, 0.95); display: flex;
            justify-content: space-between; align-items: center; padding: 0 20px; border-top: 1px solid #333;
        }

        .player-controls { flex: 1; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .central-controls { display: flex; align-items: center; gap: 25px; }
        .central-controls button { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
        .central-controls button:hover { color: white; }
        
        #btn-play-pause {
            background-color: var(--purple-main); color: white; width: 45px; height: 45px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }

        #progresso { width: 100%; height: 5px; cursor: pointer; accent-color: var(--purple-main); }

        /* MODAL */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content { background: var(--bg-modal); padding: 30px; border-radius: 12px; width: 450px; }
        .modal-content input, .modal-content select {
            width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 5px;
        }
        .save-btn { background: var(--purple-main); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-cross"></i> <span>Jesus Reina</span></div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="#" id="menu-biblioteca"><i class="fas fa-book-open"></i> Sua Biblioteca</a></li>
                    <li><button class="add-btn-sidebar" id="btn-abrir-modal"><i class="fas fa-plus"></i> Adicionar Música/Vídeo</button></li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="input-busca" placeholder="Buscar na sua biblioteca...">
            </div>

            <section class="biblioteca-local" id="secao-biblioteca">
                <h2>Sua Coleção</h2>
                <div class="lista-musicas">
                    <ul id="playlist"></ul>
                </div>
            </section>
        </main>
    </div>

    <footer class="footer-player">
        <div class="track-info">
            <div id="player-titulo" style="font-weight:bold">Nada tocando</div>
            <div id="player-artista" style="color:gray; font-size:0.8rem">Selecione um arquivo</div>
        </div>
        
        <div class="player-controls">
            <div class="central-controls">
                <button id="btn-anterior"><i class="fas fa-backward"></i></button>
                <button id="btn-play-pause"><i class="fas fa-play"></i></button>
                <button id="btn-proxima"><i class="fas fa-forward"></i></button>
            </div>
            <input type="range" id="progresso" value="0">
        </div>

        <div class="volume">
            <i class="fas fa-volume-up"></i>
        </div>
    </footer>

    <div id="modal-adicionar" class="modal">
        <div class="modal-content">
            <h3>Adicionar à Biblioteca</h3>
            <form id="form-musica">
                <input type="text" id="titulo" placeholder="Título" required>
                
                <label style="font-size: 0.8rem; color: gray;">Origem do arquivo:</label>
                <select id="origem-arquivo">
                    <option value="local">Arquivo Local (PC)</option>
                    <option value="drive">Google Drive (Link do Vídeo)</option>
                </select>

                <div id="campo-local">
                    <input type="file" id="arquivo-pc" accept="audio/*, video/*">
                </div>
                
                <div id="campo-drive" style="display:none">
                    <input type="text" id="link-drive" placeholder="Cole o link do vídeo do Google Drive aqui">
                </div>

                <button type="submit" class="save-btn">Salvar na Lista</button>
                <button type="button" onclick="fecharModal()" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        // --- VARIÁVEIS DE CONTROLE ---
        let filaDeMusicas = []; // Nossa "Fila" organizada
        let indiceAtual = -1;
        const audioPlayer = new Audio();

        // --- ELEMENTOS ---
        const modal = document.getElementById('modal-adicionar');
        const playlistUI = document.getElementById('playlist');
        const btnPlay = document.getElementById('btn-play-pause');
        const iconePlay = btnPlay.querySelector('i');

        // --- FUNÇÕES DE NAVEGAÇÃO ---
        function abrirModal() { modal.style.display = 'flex'; }
        function fecharModal() { modal.style.display = 'none'; document.getElementById('form-musica').reset(); }

        // Alternar campos Local vs Drive
        document.getElementById('origem-arquivo').addEventListener('change', (e) => {
            document.getElementById('campo-local').style.display = e.target.value === 'local' ? 'block' : 'none';
            document.getElementById('campo-drive').style.display = e.target.value === 'drive' ? 'block' : 'none';
        });

        document.getElementById('btn-abrir-modal').onclick = abrirModal;

        // --- ADICIONAR À FILA ---
        document.getElementById('form-musica').onsubmit = (e) => {
            e.preventDefault();
            const titulo = document.getElementById('titulo').value;
            const origem = document.getElementById('origem-arquivo').value;
            let url = "";

            if (origem === 'local') {
                const arquivo = document.getElementById('arquivo-pc').files[0];
                if (!arquivo) return;
                url = URL.createObjectURL(arquivo);
            } else {
                url = document.getElementById('link-drive').value;
            }

            const novaMusica = { titulo, url };
            filaDeMusicas.push(novaMusica);
            renderizarPlaylist();
            fecharModal();
        };

        // --- RENDERIZAR LISTA VISUAL ---
        function renderizarPlaylist() {
            playlistUI.innerHTML = "";
            filaDeMusicas.forEach((musica, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<i class="fas fa-play"></i> <span>${musica.titulo}</span>`;
                if (index === indiceAtual) li.classList.add('tocando');
                li.onclick = () => tocarMusica(index);
                playlistUI.appendChild(li);
            });
        }

        // --- MOTOR DO PLAYER ---
        function tocarMusica(index) {
            if (index < 0 || index >= filaDeMusicas.length) return;
            
            indiceAtual = index;
            const musica = filaDeMusicas[indiceAtual];
            
            audioPlayer.src = musica.url;
            audioPlayer.play();
            
            document.getElementById('player-titulo').textContent = musica.titulo;
            document.getElementById('player-artista').textContent = "Reproduzindo agora";
            iconePlay.classList.replace('fa-play', 'fa-pause');
            renderizarPlaylist();
        }

        btnPlay.onclick = () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                iconePlay.classList.replace('fa-play', 'fa-pause');
            } else {
                audioPlayer.pause();
                iconePlay.classList.replace('fa-pause', 'fa-play');
            }
        };

        // FUNÇÃO DOS BOTÕES ANTERIOR E PRÓXIMA
        document.getElementById('btn-proxima').onclick = () => {
            if (indiceAtual < filaDeMusicas.length - 1) {
                tocarMusica(indiceAtual + 1);
            }
        };

        document.getElementById('btn-anterior').onclick = () => {
            if (indiceAtual > 0) {
                tocarMusica(indiceAtual - 1);
            }
        };

        // --- BUSCA E BIBLIOTECA ---
        document.getElementById('input-busca').oninput = (e) => {
            const termo = e.target.value.toLowerCase();
            const itens = playlistUI.querySelectorAll('li');
            itens.forEach(item => {
                const texto = item.textContent.toLowerCase();
                item.style.display = texto.includes(termo) ? "flex" : "none";
            });
        };

        document.getElementById('menu-biblioteca').onclick = (e) => {
            e.preventDefault();
            document.getElementById('secao-biblioteca').scrollIntoView({ behavior: 'smooth' });
        };

        // Atualizar barra de progresso
        audioPlayer.ontimeupdate = () => {
            const prog = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            document.getElementById('progresso').value = prog || 0;
        };

        document.getElementById('progresso').oninput = (e) => {
            audioPlayer.currentTime = (e.target.value / 100) * audioPlayer.duration;
        };
    </script>
</body>
</html>
