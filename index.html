<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowling Kingdom Style</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "oimo": "https://unpkg.com/oimo@1.0.9/build/oimo.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">

        <header class="top-nav">
            <div class="logo">
                <img src="assets/textures/logo.png" alt="Bowling Kingdom">
            </div>
            <div class="player-profile">
                <img src="assets/textures/avatar_alex.png" alt="Alex" class="avatar">
                <div class="info">
                    <span class="name">Alex (Level 12)</span>
                    <span class="stats">🏆 215 | Game 3 | High: 288</span>
                </div>
            </div>
            <nav class="main-menu">
                <button>Home</button>
                <button class="active">Play</button>
                <button>Tournaments</button>
                <button>Profile</button>
                <button class="store-btn">Store</button>
            </nav>
            <div class="top-actions">
                <button class="icon-btn">⚙️</button>
                <button class="icon-btn">🔊</button>
            </div>
        </header>

        <aside class="scoreboard-container">
            <table class="scoreboard">
                <thead>
                    <tr>
                        <th>P1</th>
                        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                        <th>6</th><th>7</th><th>8</th><th>9</th><th>10</th>
                    }
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="player-name">Alex</td>
                        <td><div class="f-top">1</div><div class="f-bot">18</div></td>
                        <td><div class="f-top">3 /</div><div class="f-bot">18</div></td>
                        <td><div class="f-top">6 /</div><div class="f-bot">45</div></td>
                        <td><div class="f-top">7 /</div><div class="f-bot">78</div></td>
                        <td><div class="f-top">3 </div><div class="f-bot">78</div></td>
                        <td class="total">215</td>
                    </tr>
                </tbody>
            </table>
        </aside>

        <aside class="side-panel">
            <div class="panel-box opponent">
                <h3>OPPONENT INFO</h3>
                <div class="opp-flex">
                    <img src="assets/textures/avatar_sara.png" alt="Sara">
                    <div>
                        <p>Sara</p>
                        <p>Lvl 10</p>
                        <p>Score: 198</p>
                    </div>
                </div>
            </div>
            <div class="panel-box tournaments">
                <h3>UPCOMING TOURNAMENTS</h3>
                <p>🏆 Kingdom Open</p>
                <p class="time">Registration 2d</p>
            </div>
            <div class="panel-box challenges">
                <h3>DAILY CHALLENGES</h3>
                <p>Get 3 strikes <span class="progress">1/3</span></p>
                <div class="progress-bar"><div class="fill" style="width: 33%"></div></div>
            </div>
            <div class="panel-box chat">
                <h3>CHAT</h3>
                <div class="chat-messages">
                    <p><span class="sara">Sara:</span> Great frame!</p>
                    <p><span class="alex">Alex:</span> Thanks!</p>
                </div>
                <input type="text" placeholder="Type here...">
            </div>
        </aside>

        <footer class="game-controls">
            <div class="control-group physics-controls">
                <div class="power-meter">
                    <label>POWER</label>
                    <input type="range" id="power-slider" min="0" max="100" value="88">
                    <span class="power-val">88%</span>
                </div>
                <div class="spin-control">
                    <button class="spin-btn">🌀</button>
                    <div class="ball-aim">
                        <img src="assets/textures/ball_icon.png" alt="Ball">
                        <div class="aim-arrow"></div>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-secondary">SELECT BALL</button>
                <button class="btn-primary" id="throw-btn">THROW</button>
                <button class="btn-secondary">HINTS</button>
                <button class="btn-secondary">CHAT</button>
            </div>
        </footer>

    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
