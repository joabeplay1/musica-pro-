<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesus Reina - Player Local</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS: Estilos e Cores --- */
        :root {
            --bg-body: #111111;
            --bg-card: #1a1a1a;
            --bg-modal: #222222;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --purple-main: #7e3ef8;
            --purple-hover: #9c68f7;
            --border-radius-main: 12px;
            --border-radius-btn: 5px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar {
            width: 250px;
            background-color: var(--bg-body);
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 40px;
        }

        .logo i { color: var(--purple-main); }

        .main-nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: color 0.2s;
        }

        .main-nav a:hover, .main-nav li.active a { color: var(--text-main); }

        .add-btn-sidebar {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            padding: 0;
            width: 100%;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .add-btn-sidebar:hover { color: var(--text-main); }

        .playlists-section {
            margin-top: auto;
            margin-bottom: 20px;
        }

        .playlists-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .add-btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .add-btn-icon:hover { color: var(--text-main); }

        .playlist-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .playlist-item:hover { color: var(--text-main); }

        /* CONTEÚDO PRINCIPAL */
        .content {
            flex: 1;
            background-color: var(--bg-body);
            padding: 30px;
            overflow-y: auto;
            scroll-behavior: smooth; /* Ajuda na rolagem suave nativa */
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: #1a1a1a;
            border-radius: 20px;
            padding: 5px 15px;
            width: 300px;
        }

        .search-bar input {
            background: none;
            border: none;
            color: var(--text-main);
            padding-left: 10px;
            width: 100%;
            font-size: 0.9rem;
            outline: none;
        }

        .top-icons {
            display: flex;
            align-items: center;
            gap: 20px;
            color: var(--text-muted);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        /* BIBLIOTECA LOCAL (Lista) */
        .biblioteca-local { 
            margin-top: 40px;
            margin-bottom: 30px; 
            padding-top: 20px; /* Espaço para quando rolar a tela */
        }

        .lista-musicas {
            background-color: var(--bg-card);
            border-radius: var(--border-radius-main);
            padding: 20px;
            min-height: 150px;
        }

        .lista-musicas ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .lista-musicas li {
            padding: 10px 15px;
            background-color: #222;
            border-radius: var(--border-radius-btn);
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lista-musicas li:hover { background-color: #333; }

        /* PLAYER DE RODAPÉ */
        .footer-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background-color: rgba(17, 17, 17, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-top: 1px solid #333;
            z-index: 10;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 250px;
        }

        .track-info .track-title { font-weight: bold; font-size: 1rem; }
        .track-info .track-artist { color: var(--text-muted); font-size: 0.8rem; }

        .player-controls {
            flex: 1;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .central-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            color: var(--text-muted);
        }

        .central-controls button {
            background: none;
            border: none;
            color: inherit;
            font-size: 1.1rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .central-controls button:hover { color: var(--text-main); }

        #btn-anterior, #btn-proxima { font-size: 1.2rem; }

        #btn-play-pause {
            background-color: var(--purple-main);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            transition: background 0.2s;
        }

        #btn-play-pause:hover { background-color: var(--purple-hover); }

        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        #progresso {
            flex: 1;
            height: 5px;
            appearance: none;
            background: #333;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        #progresso::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            background: var(--purple-main);
            border-radius: 50%;
        }

        .player-volume {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 250px;
            justify-content: flex-end;
            color: var(--text-muted);
        }

        .volume-control { display: flex; align-items: center; gap: 8px; }

        .volume-bar {
            width: 100px;
            height: 5px;
            appearance: none;
            background: #333;
            border-radius: 3px;
            outline: none;
        }

        .volume-bar::-webkit-slider-thumb {
            appearance: none;
            width: 10px;
            height: 10px;
            background: var(--purple-main);
            border-radius: 50%;
        }

        /* MODAL ADICIONAR MÚSICA */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: var(--bg-modal);
            padding: 30px;
            border-radius: var(--border-radius-main);
            width: 450px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover { color: var(--text-main); }

        #form-musica {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #form-musica label { font-size: 0.9rem; color: var(--text-muted); }

        #form-musica input, #form-musica textarea {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: var(--text-main);
            padding: 10px;
            border-radius: var(--border-radius-btn);
            width: 100%;
        }

        .modal-footer {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .save-btn, .cancel-btn {
            padding: 10px 20px;
            border-radius: var(--border-radius-btn);
            cursor: pointer;
            font-weight: bold;
        }

        .save-btn {
            background-color: var(--purple-main);
            color: white;
            border: none;
        }

        .cancel-btn {
            background: none;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-wave-square"></i>
                <span>Jesus Reina</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li class="active"><a href="#"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="#"><i class="fas fa-book-open"></i> Sua Biblioteca</a></li>
                    <li>
                        <button class="add-btn-sidebar" id="btn-abrir-modal-sidebar">
                            <i class="fas fa-plus"></i> Adicionar Música
                        </button>
                    </li>
                </ul>
            </nav>
            
            <div class="playlists-section">
                <div class="playlists-header">
                    <h3>PLAYLISTS</h3>
                    <button class="add-btn-icon" id="btn-abrir-modal">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <ul class="playlist-list">
                    <li class="playlist-item"><div style="width:35px; height:35px; background:#333; border-radius:5px;"></div><span>Louvores</span></li>
                    <li class="playlist-item"><div style="width:35px; height:35px; background:#333; border-radius:5px;"></div><span>Pregações</span></li>
                </ul>
            </div>
        </aside>

        <main class="content">
            <div class="top-bar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar suas músicas...">
                </div>
                <div class="top-icons">
                    <div class="user-profile">
                        <div style="width:35px; height:35px; background:#444; border-radius:50%;"></div>
                        <span>Usuário</span>
                    </div>
                </div>
            </div>

            <section class="biblioteca-local">
                <div class="section-header">
                    <h2>Músicas e Vídeos Adicionados</h2>
                </div>
                <div class="lista-musicas">
                    <ul id="playlist">
                        </ul>
                </div>
            </section>
            
            <div style="height: 500px;"></div>
        </main>
    </div>

    <footer class="footer-player">
        <div class="now-playing">
            <div class="track-info">
                <div class="track-title" id="player-titulo">Aguardando...</div>
                <div class="track-artist" id="player-artista">Adicione uma música</div>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="central-controls">
                <button id="btn-anterior"><i class="fas fa-backward"></i></button>
                <button id="btn-play-pause"><i class="fas fa-play"></i></button>
                <button id="btn-proxima"><i class="fas fa-forward"></i></button>
            </div>
            
            <div class="progress-bar-container">
                <input type="range" id="progresso" value="0" min="0" max="100">
            </div>
        </div>
        
        <div class="player-volume">
            <div class="volume-control">
                <i class="fas fa-volume-up"></i>
                <input type="range" class="volume-bar" value="70">
            </div>
        </div>
    </footer>

    <div id="modal-adicionar" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Adicionar ao Catálogo</h2>
                <button id="btn-fechar-modal" class="close-btn">&times;</button>
            </div>
            
            <form id="form-musica">
                <div>
                    <label>Título da Música/Vídeo:</label>
                    <input type="text" id="titulo" required placeholder="Ex: Nome do Louvor">
                </div>
                <div>
                    <label>Ano de Lançamento:</label>
                    <input type="number" id="ano" placeholder="Ex: 2024">
                </div>
                <div>
                    <label>Arquivo do PC:</label>
                    <input type="file" id="arquivo-audio" accept="audio/*, video/*" required style="margin-top:5px;">
                </div>

                <div class="modal-footer">
                    <button type="submit" class="save-btn">Salvar</button>
                    <button type="button" class="cancel-btn" id="btn-fechar-modal-v2">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. Controle do Modal
        const modal = document.getElementById('modal-adicionar');
        const btnAbrirSidebar = document.getElementById('btn-abrir-modal-sidebar');
        const btnAbrirPlaylist = document.getElementById('btn-abrir-modal');
        const btnFecharX = document.getElementById('btn-fechar-modal');
        const btnFecharCancelar = document.getElementById('btn-fechar-modal-v2');

        function abrirModal() { modal.style.display = 'flex'; }
        function fecharModal() { modal.style.display = 'none'; }

        btnAbrirSidebar.addEventListener('click', abrirModal);
        btnAbrirPlaylist.addEventListener('click', abrirModal);
        btnFecharX.addEventListener('click', fecharModal);
        btnFecharCancelar.addEventListener('click', fecharModal);

        // 2. Motor de Áudio e Lista
        const formMusica = document.getElementById('form-musica');
        const listaPlaylist = document.getElementById('playlist');
        const audioPlayer = new Audio();
        
        const btnPlayPause = document.getElementById('btn-play-pause');
        const iconePlayPause = btnPlayPause.querySelector('i');
        const tituloRodape = document.getElementById('player-titulo');
        const artistaRodape = document.getElementById('player-artista');
        const barraProgresso = document.getElementById('progresso');

        formMusica.addEventListener('submit', function(evento) {
            evento.preventDefault();

            const titulo = document.getElementById('titulo').value;
            const ano = document.getElementById('ano').value;
            const arquivo = document.getElementById('arquivo-audio').files[0];

            if (arquivo) {
                const urlArquivo = URL.createObjectURL(arquivo);

                const li = document.createElement('li');
                li.innerHTML = `<i class="fas fa-music" style="color:var(--purple-main)"></i> <strong>${titulo}</strong> <span style="color:#aaa; font-size:0.8em; margin-left:auto;">${ano}</span>`;
                
                li.addEventListener('click', () => {
                    tocarMusica(urlArquivo, titulo, "Arquivo Local");
                });

                listaPlaylist.appendChild(li);
                fecharModal();
                formMusica.reset();
            }
        });

        // 3. Play / Pause
        function tocarMusica(url, titulo, artista) {
            audioPlayer.src = url;
            audioPlayer.play();
            
            tituloRodape.textContent = titulo;
            artistaRodape.textContent = artista;
            
            iconePlayPause.classList.replace('fa-play', 'fa-pause');
        }

        btnPlayPause.addEventListener('click', () => {
            if (!audioPlayer.src) return;

            if (audioPlayer.paused) {
                audioPlayer.play();
                iconePlayPause.classList.replace('fa-play', 'fa-pause');
            } else {
                audioPlayer.pause();
                iconePlayPause.classList.replace('fa-pause', 'fa-play');
            }
        });

        // 4. Barra de Progresso
        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                const porcentagem = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                barraProgresso.value = porcentagem;
            }
        });

        barraProgresso.addEventListener('input', () => {
            const tempoDesejado = (barraProgresso.value / 100) * audioPlayer.duration;
            audioPlayer.currentTime = tempoDesejado;
        });

        // 5. Botão Biblioteca e Busca
        const linkBiblioteca = document.querySelector('.main-nav a i.fa-book-open').parentElement; 
        const secaoBiblioteca = document.querySelector('.biblioteca-local');
        const areaConteudo = document.querySelector('.content');

        linkBiblioteca.addEventListener('click', (evento) => {
            evento.preventDefault(); 
            // Rola o conteúdo principal até a seção da biblioteca
            areaConteudo.scrollTo({
                top: secaoBiblioteca.offsetTop - 20,
                behavior: 'smooth'
            });
        });

        const inputBusca = document.querySelector('.search-bar input');

        inputBusca.addEventListener('input', () => {
            const termoBuscado = inputBusca.value.toLowerCase(); 
            const musicasNaLista = listaPlaylist.querySelectorAll('li'); 

            musicasNaLista.forEach(musica => {
                const textoMusica = musica.textContent.toLowerCase();
                
                if (textoMusica.includes(termoBuscado)) {
                    musica.style.display = 'flex'; 
                } else {
                    musica.style.display = 'none'; 
                }
            });
        });
    </script>
</body>
</html>
