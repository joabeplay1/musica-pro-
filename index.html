<div class="app-builder">

  <div class="input-panel">
    <textarea id="ideaInput"
      placeholder="Descreva o aplicativo"></textarea>

    <button onclick="generateApp()">
      Criar Aplicativo
    </button>
  </div>

  <div class="result-container">

    <div class="prompt-box">
      <h2>Prompt Gerado</h2>
      <pre id="generatedPrompt"></pre>
    </div>

    <div class="code-box">
      <h2>Código Gerado</h2>
      <pre id="generatedCode"></pre>
    </div>

  </div>

  <iframe id="preview"></iframe>

</div>
