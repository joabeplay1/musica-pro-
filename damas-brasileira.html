<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas Brasileira</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1008; color: #f5f0e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
h1 { font-size: 2rem; font-weight: 800; color: #f5c842; text-shadow: 0 0 16px rgba(245,200,66,0.4); margin-bottom: 4px; }
.subtitle { color: #a0917a; font-size: 0.85rem; margin-bottom: 20px; }
#menu { text-align: center; max-width: 380px; width: 100%; }
.crown-icon { font-size: 3rem; margin-bottom: 8px; display: block; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.mode-btn { background: #2a1e10; border: 2px solid #4a3520; color: #f5f0e8; padding: 16px 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: left; }
.mode-btn:hover, .mode-btn.active { border-color: #c8922a; background: #3a2510; }
.mode-btn .icon { font-size: 1.5rem; margin-bottom: 6px; display: block; }
.mode-btn .label { font-weight: 700; font-size: 0.9rem; display: block; }
.mode-btn .desc { font-size: 0.75rem; color: #a0917a; display: block; margin-top: 2px; }
.diff-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #a0917a; font-weight: 600; margin-bottom: 8px; text-align: left; }
.diff-btns { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.diff-btn { background: #2a1e10; border: 2px solid #4a3520; color: #f5f0e8; padding: 10px 14px; border-radius: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; text-align: left; }
.diff-btn:hover, .diff-btn.active { border-color: #c8922a; background: #3a2510; }
.diff-btn .dlabel { font-weight: 700; font-size: 0.88rem; }
.diff-btn .ddesc { font-size: 0.75rem; color: #a0917a; }
.start-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #c8922a, #a06a10); border: none; color: #fff; font-size: 1.1rem; font-weight: 800; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
.start-btn:hover { background: linear-gradient(135deg, #daa030, #b87a20); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,146,42,0.4); }
.start-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

#game { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
.game-header { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.back-btn, .restart-btn { background: transparent; border: 1px solid #4a3520; color: #a0917a; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
.back-btn:hover, .restart-btn:hover { border-color: #c8922a; color: #f5f0e8; }
.game-title { text-align: center; }
.game-title h2 { font-size: 1.1rem; font-weight: 700; color: #f5c842; }
.game-title p { font-size: 0.72rem; color: #a0917a; }
.player-info { width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 12px; background: #2a1e10; border: 2px solid #4a3520; margin: 6px 0; transition: all 0.3s; }
.player-info.active { border-color: #c8922a; background: #3a2510; box-shadow: 0 0 12px rgba(200,146,42,0.2); }
.player-piece { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.player-piece.black { background: radial-gradient(circle at 35% 35%, #555, #111); box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
.player-piece.white { background: radial-gradient(circle at 35% 35%, #fff, #ccc); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.player-name { font-weight: 700; font-size: 0.88rem; }
.player-stats { font-size: 0.72rem; color: #a0917a; }
.active-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 1.5s ease-in-out infinite; margin-left: auto; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.board-wrap { position: relative; border-radius: 12px; overflow: hidden; border: 4px solid #5a3a1a; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
#board { display: grid; grid-template-columns: repeat(8, 1fr); width: min(480px, calc(100vw - 40px)); height: min(480px, calc(100vw - 40px)); }
.sq { position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: filter 0.1s; }
.sq.light { background: #c8a878; }
.sq.dark { background: #7a4a22; }
.sq.valid-move::after { content: ''; position: absolute; width: 30%; height: 30%; border-radius: 50%; background: rgba(74,222,128,0.6); animation: pulse 1s ease-in-out infinite; }
.sq.capture-move::after { content: ''; position: absolute; width: 30%; height: 30%; border-radius: 50%; background: rgba(248,113,113,0.7); animation: pulse 1s ease-in-out infinite; }
.sq.valid-move:hover, .sq.capture-move:hover { filter: brightness(1.2); }
.sq .coord-r { position: absolute; left: 2px; top: 2px; font-size: 9px; opacity: 0.4; color: #c8a878; }
.sq .coord-c { position: absolute; right: 2px; bottom: 2px; font-size: 9px; opacity: 0.4; color: #c8a878; }

.piece { width: 80%; height: 80%; border-radius: 50%; position: relative; cursor: pointer; transition: transform 0.15s; z-index: 1; }
.piece:hover { transform: scale(1.05); }
.piece.selected { transform: scale(1.1); box-shadow: 0 0 0 3px #fbbf24, 0 0 0 5px rgba(251,191,36,0.3); z-index: 2; }
.piece.black-p { background: radial-gradient(circle at 35% 30%, #666, #111 70%); box-shadow: 0 3px 8px rgba(0,0,0,0.6); }
.piece.white-p { background: radial-gradient(circle at 35% 30%, #fff, #bbb 70%); box-shadow: 0 3px 8px rgba(0,0,0,0.3); }
.piece.king { animation: goldPulse 2s ease-in-out infinite; }
.piece.black-k { background: radial-gradient(circle at 35% 30%, #334, #001 70%); border: 2px solid #ffd700; }
.piece.white-k { background: radial-gradient(circle at 35% 30%, #fff, #ddd 70%); border: 2px solid #ffd700; }
.piece .crown { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 45%; color: #ffd700; text-shadow: 0 0 6px rgba(255,215,0,0.8); }
@keyframes goldPulse { 0%,100%{box-shadow:0 0 8px 2px rgba(255,215,0,0.3)} 50%{box-shadow:0 0 16px 6px rgba(255,215,0,0.6)} }

.turn-indicator { margin-top: 8px; font-size: 0.78rem; color: #a0917a; text-align: center; }
.mandatory-capture { color: #f87171; font-weight: 700; animation: pulse 1s ease-in-out infinite; margin-top: 4px; }

.winner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
.winner-card { background: #2a1e10; border: 2px solid #c8922a; border-radius: 20px; padding: 40px 32px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 16px 48px rgba(0,0,0,0.8); }
.trophy { font-size: 3.5rem; display: block; margin-bottom: 12px; }
.winner-card h2 { font-size: 1.8rem; font-weight: 800; color: #f5c842; margin-bottom: 8px; }
.winner-card p { color: #a0917a; font-size: 0.9rem; margin-bottom: 24px; }
.winner-card .bold { color: #f5f0e8; font-weight: 700; }
.win-btns { display: flex; flex-direction: column; gap: 10px; }
.win-btn { padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.95rem; font-weight: 700; border: none; transition: all 0.2s; }
.win-btn.primary { background: linear-gradient(135deg, #c8922a, #a06a10); color: #fff; }
.win-btn.primary:hover { background: linear-gradient(135deg, #daa030, #b87a20); }
.win-btn.secondary { background: transparent; border: 2px solid #4a3520; color: #a0917a; }
.win-btn.secondary:hover { border-color: #c8922a; color: #f5f0e8; }
</style>
</head>
<body>

<div id="menu">
  <span class="crown-icon">♛</span>
  <h1>Damas</h1>
  <p class="subtitle">Jogo de Damas Brasileira</p>

  <p class="diff-label" style="margin-bottom:8px">Modo de Jogo</p>
  <div class="mode-grid">
    <button class="mode-btn" id="mode-pvp" onclick="selectMode('pvp')">
      <span class="icon">👥</span>
      <span class="label">Jogador vs Jogador</span>
      <span class="desc">Jogue com um amigo</span>
    </button>
    <button class="mode-btn" id="mode-bot" onclick="selectMode('bot')">
      <span class="icon">🤖</span>
      <span class="label">Jogador vs Bot</span>
      <span class="desc">Desafie a máquina</span>
    </button>
  </div>

  <div id="diff-section" style="display:none">
    <p class="diff-label">Dificuldade</p>
    <div class="diff-btns">
      <button class="diff-btn active" id="diff-easy" onclick="selectDiff('easy')">
        <span style="color:#4ade80;font-size:1.1rem">⚡</span>
        <div><div class="dlabel">Fácil</div><div class="ddesc">Joga aleatoriamente</div></div>
      </button>
      <button class="diff-btn" id="diff-medium" onclick="selectDiff('medium')">
        <span style="color:#fbbf24;font-size:1.1rem">🧠</span>
        <div><div class="dlabel">Médio</div><div class="ddesc">Jogadas básicas</div></div>
      </button>
      <button class="diff-btn" id="diff-hard" onclick="selectDiff('hard')">
        <span style="color:#f87171;font-size:1.1rem">✨</span>
        <div><div class="dlabel">Difícil</div><div class="ddesc">Estratégia avançada</div></div>
      </button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startGame()" disabled>Selecione um modo</button>
</div>

<div id="game">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">← Menu</button>
    <div class="game-title">
      <h2>Damas</h2>
      <p id="game-subtitle">Jogador vs Jogador</p>
    </div>
    <button class="restart-btn" onclick="restartGame()">↺</button>
  </div>

  <div class="player-info" id="info-white">
    <div class="player-piece white">♛</div>
    <div>
      <div class="player-name" id="name-white">Jogador 2 (Brancas)</div>
      <div class="player-stats" id="stats-white">12 peças · 0 damas</div>
    </div>
    <div class="active-dot" id="dot-white" style="display:none"></div>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
  </div>

  <div class="player-info" id="info-black">
    <div class="player-piece black">♛</div>
    <div>
      <div class="player-name" id="name-black">Jogador 1 (Pretas)</div>
      <div class="player-stats" id="stats-black">12 peças · 0 damas</div>
    </div>
    <div class="active-dot" id="dot-black" style="display:none"></div>
  </div>

  <div class="turn-indicator" id="turn-indicator"></div>
  <div class="mandatory-capture" id="mandatory-capture" style="display:none">⚠ Captura obrigatória!</div>
</div>

<div class="winner-overlay" id="winner-overlay" style="display:none">
  <div class="winner-card">
    <span class="trophy">🏆</span>
    <h2>Vitória!</h2>
    <p>As peças <span class="bold" id="winner-label"></span> venceram!</p>
    <div class="win-btns">
      <button class="win-btn primary" onclick="restartGame()">↺ Jogar Novamente</button>
      <button class="win-btn secondary" onclick="goHome()">⌂ Menu Principal</button>
    </div>
  </div>
</div>

<script>
// ===== GAME LOGIC =====
const EMPTY = null, BLACK = 'b', WHITE = 'w', BLACK_KING = 'B', WHITE_KING = 'W';
const isBlack = p => p === BLACK || p === BLACK_KING;
const isWhite = p => p === WHITE || p === WHITE_KING;
const isKing = p => p === BLACK_KING || p === WHITE_KING;
const isPlayerPiece = (p, player) => player === 'black' ? isBlack(p) : isWhite(p);
const opponentOf = player => player === 'black' ? 'white' : 'black';
const inBounds = (r, c) => r >= 0 && r < 8 && c >= 0 && c < 8;
const cloneBoard = b => b.map(r => [...r]);

function createInitialBoard() {
  const b = Array(8).fill(null).map(() => Array(8).fill(EMPTY));
  for (let r = 0; r < 3; r++) for (let c = 0; c < 8; c++) if ((r+c)%2===1) b[r][c] = WHITE;
  for (let r = 5; r < 8; r++) for (let c = 0; c < 8; c++) if ((r+c)%2===1) b[r][c] = BLACK;
  return b;
}

function getSimpleMoves(board, r, c) {
  const piece = board[r][c]; if (!piece) return [];
  const moves = [];
  if (isKing(piece)) {
    for (const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
      let nr=r+dr, nc=c+dc;
      while (inBounds(nr,nc) && board[nr][nc]===EMPTY) { moves.push({from:[r,c],to:[nr,nc],captures:[]}); nr+=dr; nc+=dc; }
    }
  } else {
    const dir = isBlack(piece) ? -1 : 1;
    for (const dc of [-1,1]) { const nr=r+dir, nc=c+dc; if (inBounds(nr,nc) && board[nr][nc]===EMPTY) moves.push({from:[r,c],to:[nr,nc],captures:[]}); }
  }
  return moves;
}

function getCaptureSequences(board, r, c, captured=[], isPlayerBlack) {
  const piece = board[r][c]; if (!piece) return [];
  const isBlackPiece = isPlayerBlack !== undefined ? isPlayerBlack : isBlack(piece);
  const sequences = [];
  if (isKing(piece)) {
    for (const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
      let nr=r+dr, nc=c+dc;
      while (inBounds(nr,nc) && board[nr][nc]===EMPTY) { nr+=dr; nc+=dc; }
      if (inBounds(nr,nc) && board[nr][nc]!==EMPTY) {
        const enemy=board[nr][nc];
        if (isBlack(enemy)!==isBlackPiece) {
          const captKey=`${nr},${nc}`;
          if (!captured.includes(captKey)) {
            const er=nr, ec=nc;
            let lr=er+dr, lc=ec+dc;
            while (inBounds(lr,lc) && board[lr][lc]===EMPTY) {
              const newCaptured=[...captured,captKey];
              const nb=cloneBoard(board); nb[r][c]=EMPTY; nb[er][ec]=EMPTY; nb[lr][lc]=piece;
              const further=getCaptureSequences(nb,lr,lc,newCaptured,isBlackPiece);
              if (further.length>0) { for (const seq of further) sequences.push({from:[r,c],to:seq.to,captures:[[er,ec],...seq.captures]}); }
              else sequences.push({from:[r,c],to:[lr,lc],captures:[[er,ec]]});
              lr+=dr; lc+=dc;
            }
          }
        }
      }
    }
  } else {
    for (const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
      const mr=r+dr, mc=c+dc, lr=r+2*dr, lc=c+2*dc;
      if (!inBounds(lr,lc)) continue;
      if (board[mr][mc]===EMPTY) continue;
      if (isBlack(board[mr][mc])===isBlackPiece) continue;
      const captKey=`${mr},${mc}`;
      if (captured.includes(captKey)) continue;
      if (board[lr][lc]!==EMPTY) continue;
      const newCaptured=[...captured,captKey];
      const nb=cloneBoard(board); nb[r][c]=EMPTY; nb[mr][mc]=EMPTY;
      let promoted=piece;
      if (!isKing(piece) && ((isBlackPiece&&lr===0)||(!isBlackPiece&&lr===7))) promoted=isBlackPiece?BLACK_KING:WHITE_KING;
      nb[lr][lc]=promoted;
      if (promoted!==piece) { sequences.push({from:[r,c],to:[lr,lc],captures:[[mr,mc]]}); }
      else {
        const further=getCaptureSequences(nb,lr,lc,newCaptured,isBlackPiece);
        if (further.length>0) { for (const seq of further) sequences.push({from:[r,c],to:seq.to,captures:[[mr,mc],...seq.captures]}); }
        else sequences.push({from:[r,c],to:[lr,lc],captures:[[mr,mc]]});
      }
    }
  }
  return sequences;
}

function getAllMoves(board, player) {
  const allCaptures=[], allSimple=[];
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    if (!isPlayerPiece(board[r][c],player)) continue;
    const caps=getCaptureSequences(board,r,c,[]);
    if (caps.length>0) allCaptures.push(...caps);
    else allSimple.push(...getSimpleMoves(board,r,c));
  }
  if (allCaptures.length>0) { const mx=Math.max(...allCaptures.map(m=>m.captures.length)); return allCaptures.filter(m=>m.captures.length===mx); }
  return allSimple;
}

function getMovesForPiece(board, r, c, player) {
  return getAllMoves(board, player).filter(m=>m.from[0]===r&&m.from[1]===c);
}

function applyMove(board, move) {
  const nb=cloneBoard(board);
  const piece=nb[move.from[0]][move.from[1]];
  nb[move.from[0]][move.from[1]]=EMPTY;
  for (const [cr,cc] of move.captures) nb[cr][cc]=EMPTY;
  let final=piece;
  if (!isKing(piece)) {
    if ((isBlack(piece)&&move.to[0]===0)||(!isBlack(piece)&&move.to[0]===7)) final=isBlack(piece)?BLACK_KING:WHITE_KING;
  }
  nb[move.to[0]][move.to[1]]=final;
  return nb;
}

function checkWinner(board, currentPlayer) {
  const opp=opponentOf(currentPlayer);
  let oppPieces=0;
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) if (isPlayerPiece(board[r][c],opp)) oppPieces++;
  if (oppPieces===0) return currentPlayer;
  if (getAllMoves(board,opp).length===0) return currentPlayer;
  return null;
}

function countPieces(board) {
  let black=0,white=0,blackKings=0,whiteKings=0;
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    const p=board[r][c];
    if (p===BLACK) black++; else if (p===WHITE) white++;
    else if (p===BLACK_KING) {black++;blackKings++;} else if (p===WHITE_KING) {white++;whiteKings++;}
  }
  return {black,white,blackKings,whiteKings};
}

// ===== BOT AI =====
function evaluateBoard(board, botPlayer) {
  const counts=countPieces(board);
  const opp=opponentOf(botPlayer);
  const bp=botPlayer==='black'?counts.black:counts.white, bk=botPlayer==='black'?counts.blackKings:counts.whiteKings;
  const op=opp==='black'?counts.black:counts.white, ok=opp==='black'?counts.blackKings:counts.whiteKings;
  let score=(bp-bk)*3+bk*7-((op-ok)*3+ok*7);
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    const piece=board[r][c]; if (!piece) continue;
    const bot=isPlayerPiece(piece,botPlayer);
    const cb=(3.5-Math.abs(r-3.5))*0.1+(3.5-Math.abs(c-3.5))*0.1;
    if (bot) { score+=cb; if (!isKing(piece)) score+=(botPlayer==='black'?(7-r):r)*0.15; }
    else score-=cb;
  }
  return score;
}

function minimax(board, depth, alpha, beta, isMax, botPlayer, curPlayer) {
  const w=checkWinner(board,opponentOf(curPlayer));
  if (w) return w===botPlayer?1000+depth:-1000-depth;
  if (depth===0) return evaluateBoard(board,botPlayer);
  const moves=getAllMoves(board,curPlayer);
  if (moves.length===0) return curPlayer===botPlayer?-1000:1000;
  if (isMax) {
    let mx=-Infinity;
    for (const m of moves) { const e=minimax(applyMove(board,m),depth-1,alpha,beta,false,botPlayer,opponentOf(curPlayer)); mx=Math.max(mx,e); alpha=Math.max(alpha,e); if (beta<=alpha) break; }
    return mx;
  } else {
    let mn=Infinity;
    for (const m of moves) { const e=minimax(applyMove(board,m),depth-1,alpha,beta,true,botPlayer,opponentOf(curPlayer)); mn=Math.min(mn,e); beta=Math.min(beta,e); if (beta<=alpha) break; }
    return mn;
  }
}

function getBotMove(board, botPlayer, difficulty) {
  const moves=getAllMoves(board,botPlayer);
  if (!moves.length) return null;
  if (difficulty==='easy') return moves[Math.floor(Math.random()*moves.length)];
  if (difficulty==='medium') {
    const caps=moves.filter(m=>m.captures.length>0);
    if (caps.length>0) { const mx=Math.max(...caps.map(m=>m.captures.length)); const best=caps.filter(m=>m.captures.length===mx); return best[Math.floor(Math.random()*best.length)]; }
    let bs=-Infinity, bm=[];
    for (const m of moves) { const s=evaluateBoard(applyMove(board,m),botPlayer); if (s>bs) {bs=s;bm=[m];} else if (s===bs) bm.push(m); }
    return bm[Math.floor(Math.random()*bm.length)];
  }
  // hard
  let bs=-Infinity, bm=moves[0];
  for (const m of moves) { const s=minimax(applyMove(board,m),4,-Infinity,Infinity,false,botPlayer,opponentOf(botPlayer)); if (s>bs) {bs=s;bm=m;} }
  return bm;
}

// ===== UI STATE =====
let gameMode='pvp', difficulty='easy', board=[], currentPlayer='black', selectedPiece=null, validMoves=[], winner=null, botTimer=null, moveCount=0;
let menuMode=null, menuDiff='easy';

// ===== MENU =====
function selectMode(mode) {
  menuMode=mode;
  document.getElementById('mode-pvp').classList.toggle('active', mode==='pvp');
  document.getElementById('mode-bot').classList.toggle('active', mode==='bot');
  document.getElementById('diff-section').style.display = mode==='bot'?'block':'none';
  const btn=document.getElementById('start-btn');
  btn.disabled=false; btn.textContent='Iniciar Partida';
}

function selectDiff(diff) {
  menuDiff=diff;
  ['easy','medium','hard'].forEach(d => document.getElementById('diff-'+d).classList.toggle('active', d===diff));
}

function startGame() {
  if (!menuMode) return;
  gameMode=menuMode; difficulty=menuDiff;
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('game').style.flexDirection='column';
  document.getElementById('game').style.alignItems='center';

  const sub = gameMode==='pvp' ? 'Jogador vs Jogador' : `vs Bot (${{'easy':'Fácil','medium':'Médio','hard':'Difícil'}[difficulty]})`;
  document.getElementById('game-subtitle').textContent=sub;
  document.getElementById('name-white').textContent = gameMode==='bot' ? `Bot (${{'easy':'Fácil','medium':'Médio','hard':'Difícil'}[difficulty]})` : 'Jogador 2 (Brancas)';
  document.getElementById('name-black').textContent = gameMode==='bot' ? 'Você (Pretas)' : 'Jogador 1 (Pretas)';

  initGame();
}

function goHome() {
  clearTimeout(botTimer);
  document.getElementById('winner-overlay').style.display='none';
  document.getElementById('game').style.display='none';
  document.getElementById('menu').style.display='block';
}

// ===== GAME =====
function initGame() {
  board=createInitialBoard(); currentPlayer='black'; selectedPiece=null; validMoves=[]; winner=null; moveCount=0;
  document.getElementById('winner-overlay').style.display='none';
  renderBoard(); updateUI();
}

function restartGame() { clearTimeout(botTimer); initGame(); }

function renderBoard() {
  const el=document.getElementById('board'); el.innerHTML='';
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    const sq=document.createElement('div');
    sq.className='sq '+(((r+c)%2===0)?'light':'dark');
    sq.dataset.r=r; sq.dataset.c=c;

    const isVM=validMoves.some(m=>m.to[0]===r&&m.to[1]===c);
    const isCap=validMoves.some(m=>m.to[0]===r&&m.to[1]===c&&m.captures.length>0);
    if (isCap) sq.classList.add('capture-move');
    else if (isVM) sq.classList.add('valid-move');

    if (c===0) { const lbl=document.createElement('span'); lbl.className='coord-r'; lbl.textContent=8-r; sq.appendChild(lbl); }
    if (r===7) { const lbl=document.createElement('span'); lbl.className='coord-c'; lbl.textContent=String.fromCharCode(97+c); sq.appendChild(lbl); }

    const piece=board[r][c];
    if (piece) {
      const p=document.createElement('div');
      const bk=isBlack(piece), kg=isKing(piece);
      p.className='piece '+(bk?(kg?'black-k':'black-p'):(kg?'white-k':'white-p'))+(kg?' king':'');
      if (selectedPiece&&selectedPiece[0]===r&&selectedPiece[1]===c) p.classList.add('selected');
      if (kg) { const cr=document.createElement('div'); cr.className='crown'; cr.textContent='♛'; p.appendChild(cr); }
      p.addEventListener('click', e => { e.stopPropagation(); handleClick(r,c); });
      sq.appendChild(p);
    }
    sq.addEventListener('click', () => handleClick(r,c));
    el.appendChild(sq);
  }
}

function updateUI() {
  const counts=countPieces(board);
  document.getElementById('stats-white').textContent=`${counts.white} peças · ${counts.whiteKings} damas`;
  document.getElementById('stats-black').textContent=`${counts.black} peças · ${counts.blackKings} damas`;

  document.getElementById('info-white').classList.toggle('active', currentPlayer==='white');
  document.getElementById('info-black').classList.toggle('active', currentPlayer==='black');
  document.getElementById('dot-white').style.display=currentPlayer==='white'?'block':'none';
  document.getElementById('dot-black').style.display=currentPlayer==='black'?'block':'none';

  const turnEl=document.getElementById('turn-indicator');
  turnEl.textContent=`${currentPlayer==='black'?'⚫':'⚪'} Vez das ${currentPlayer==='black'?'Pretas':'Brancas'} · Jogada ${moveCount}`;

  const mandEl=document.getElementById('mandatory-capture');
  const hasCap=validMoves.length>0&&validMoves[0].captures.length>0;
  mandEl.style.display=(hasCap&&!winner)?'block':'none';
}

function handleClick(r, c) {
  if (winner || (gameMode==='bot'&&currentPlayer==='white')) return;
  const piece=board[r][c];

  if (piece && isPlayerPiece(piece, currentPlayer)) {
    const allMoves=getAllMoves(board,currentPlayer);
    const pMoves=allMoves.filter(m=>m.from[0]===r&&m.from[1]===c);
    if (pMoves.length>0) { selectedPiece=[r,c]; validMoves=pMoves; renderBoard(); updateUI(); return; }
  }

  if (selectedPiece) {
    const move=validMoves.find(m=>m.to[0]===r&&m.to[1]===c);
    if (move) { executeMove(move); return; }
    if (piece && isPlayerPiece(piece, currentPlayer)) {
      const allMoves=getAllMoves(board,currentPlayer);
      const pMoves=allMoves.filter(m=>m.from[0]===r&&m.from[1]===c);
      if (pMoves.length>0) { selectedPiece=[r,c]; validMoves=pMoves; renderBoard(); updateUI(); return; }
    }
  }

  selectedPiece=null; validMoves=[]; renderBoard(); updateUI();
}

function executeMove(move) {
  board=applyMove(board,move); selectedPiece=null; validMoves=[]; moveCount++;
  const w=checkWinner(board,currentPlayer);
  if (w) { winner=w; renderBoard(); updateUI(); showWinner(w); return; }
  currentPlayer=opponentOf(currentPlayer);
  renderBoard(); updateUI();
  if (gameMode==='bot'&&currentPlayer==='white') scheduleBotMove();
}

function scheduleBotMove() {
  const delay=difficulty==='hard'?800:400;
  botTimer=setTimeout(()=>{
    const move=getBotMove(board,'white',difficulty);
    if (move) {
      board=applyMove(board,move); moveCount++;
      const w=checkWinner(board,'white');
      if (w) { winner=w; currentPlayer='white'; renderBoard(); updateUI(); showWinner(w); return; }
      currentPlayer='black';
    } else { winner='black'; showWinner('black'); }
    renderBoard(); updateUI();
  }, delay);
}

function showWinner(w) {
  document.getElementById('winner-label').textContent=w==='black'?'Pretas':'Brancas';
  document.getElementById('winner-overlay').style.display='flex';
}
</script>
