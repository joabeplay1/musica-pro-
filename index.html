<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>CinePlay 8 Ball Pool | OFICIAL</title>
    <style>
        :root { --neon: #00ff88; --wood: #2c1a10; --felt: #07633a; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; }
        
        #app { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw; }

        /* HUD - Estilo App Profissional */
        #hud {
            width: 95%; max-width: 1200px; background: rgba(20,20,20,0.95);
            padding: 12px 25px; border-radius: 20px; border-bottom: 4px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .player { padding: 10px 20px; border-radius: 12px; border: 2px solid transparent; width: 42%; text-align: center; transition: 0.4s; }
        .active { border-color: var(--neon); background: rgba(0,255,136,0.15); box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .group-tag { font-size: 0.8em; color: var(--neon); font-weight: 900; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        /* Mesa Gigante */
        #table-container {
            position: relative; padding: 18px; background: var(--wood); border-radius: 20px;
            box-shadow: inset 0 0 50px #000, 0 20px 80px rgba(0,0,0,1);
        }
        canvas { background: var(--felt); border-radius: 5px; display: block; cursor: crosshair; box-shadow: inset 0 0 100px rgba(0,0,0,0.4); }

        /* Barra de Força Lateral */
        #power-ui {
            position: absolute; right: -40px; top: 50%; transform: translateY(-50%);
            height: 300px; width: 18px; background: #111; border: 2px solid #444; border-radius: 10px; overflow: hidden;
        }
        #power-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, var(--neon), #ffeb3b, #f00); transition: height 0.1s; }

        #game-log { position: absolute; bottom: 20px; background: rgba(0,0,0,0.8); padding: 8px 30px; border-radius: 30px; border: 1px solid #333; font-size: 14px; }
    </style>
</head>
<body>

<div id="app">
    <div id="hud">
        <div id="p1-card" class="player active">
            <div style="font-weight:900; font-size: 1.2em;">👤 JOABE PLAY</div>
            <div id="p1-type" class="group-tag">DEFININDO GRUPO...</div>
        </div>
        <div style="font-weight: 900; color: #444; font-size: 1.5em; font-style: italic;">VS</div>
        <div id="p2-card" class="player">
            <div style="font-weight:900; font-size: 1.2em;">🤖 BOT MASTER</div>
            <div id="p2-type" class="group-tag"></div>
        </div>
    </div>

    <div id="table-container">
        <div id="power-ui"><div id="power-fill"></div></div>
        <canvas id="poolCanvas"></canvas>
    </div>

    <div id="game-log">Ajuste a mira e segure para carregar a força!</div>
</div>

<script>
    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const powerFill = document.getElementById('power-fill');
    const log = document.getElementById('game-log');

    // --- CONFIGURAÇÕES FÍSICAS PROFISSIONAIS ---
    let ballRadius, whiteBall, balls = [], pockets = [];
    const FRICTION = 0.988; // Deslizamento suave
    const WALL_BOUNCE = 0.75;
    let turn = 1, p1Type = null, isMoving = false, isCharging = false, power = 0, mouseX, mouseY;

    class Ball {
        constructor(x, y, radius, color, num, type) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.num = num; this.type = type;
            this.vx = 0; this.vy = 0; this.inPocket = false;
        }

        draw() {
            if (this.inPocket) return;
            
            // Sombra realista
            ctx.beginPath();
            ctx.arc(this.x + 4, this.y + 4, this.radius, 0, Math.PI*2);
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fill();

            // Corpo da Bola
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color; ctx.fill();

            // Faixa (Stripes)
            if (this.type === 'stripe') {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.55, 0, 0, Math.PI * 2);
                ctx.fillStyle = "#fff"; ctx.fill();
            }

            // Círculo do Número
            if (this.type !== 'white') {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.52, 0, Math.PI*2);
                ctx.fillStyle = "#fff"; ctx.fill();
                ctx.fillStyle = "#000"; ctx.font = `bold ${this.radius * 0.8}px Arial`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.num, this.x, this.y);
            }

            // Brilho Premium 3D
            let shine = ctx.createRadialGradient(this.x-5, this.y-5, 1, this.x, this.y, this.radius);
            shine.addColorStop(0, "rgba(255,255,255,0.4)");
            shine.addColorStop(1, "rgba(0,0,0,0.2)");
            ctx.fillStyle = shine; ctx.fill();
        }

        update() {
            if (this.inPocket) return;
            this.x += this.vx; this.y += this.vy;
            this.vx *= FRICTION; this.vy *= FRICTION;

            if (Math.abs(this.vx) < 0.08) this.vx = 0;
            if (Math.abs(this.vy) < 0.08) this.vy = 0;

            // Bordas
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.vx *= -WALL_BOUNCE;
                this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
            }
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                this.vy *= -WALL_BOUNCE;
                this.y = this.y < this.radius ? this.radius : canvas.height - this.radius;
            }
            this.checkPocket();
        }

        checkPocket() {
            pockets.forEach(p => {
                const dist = Math.hypot(this.x - p.x, this.y - p.y);
                if (dist < ballRadius * 1.9) { // Encaçape real
                    this.inPocket = true; this.vx = 0; this.vy = 0;
                    processRules(this);
                }
            });
        }
    }

    function init() {
        const w = window.innerWidth * 0.92;
        canvas.width = w; canvas.height = w / 2;
        ballRadius = canvas.width * 0.021; // Bolas GIGANTES

        pockets = [
            {x: 0, y: 0}, {x: canvas.width/2, y: -5}, {x: canvas.width, y: 0},
            {x: 0, y: canvas.height}, {x: canvas.width/2, y: canvas.height+5}, {x: canvas.width, y: canvas.height}
        ];

        setupRack();
        requestAnimationFrame(gameLoop);
    }

    function setupRack() {
        balls = [];
        whiteBall = new Ball(canvas.width * 0.25, canvas.height/2, ballRadius, "#fff", 0, "white");
        balls.push(whiteBall);

        const colors = ["#f1c40f", "#2980b9", "#e74c3c", "#8e44ad", "#d35400", "#27ae60", "#c0392b", "#000"];
        let count = 1;
        const startX = canvas.width * 0.68, startY = canvas.height/2;

        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                let type = (count === 8) ? "black" : (count <= 7 ? "solid" : "stripe");
                let color = (count === 8) ? "#000" : colors[(count-1) % 7];
                balls.push(new Ball(startX + (i*ballRadius*1.78), startY + (j*ballRadius*2.05) - (i*ballRadius), ballRadius, color, count, type));
                count++;
            }
        }
    }

    function processRules(ball) {
        if (ball.type === "white") {
            log.innerText = "FALTA! Bola branca encaçapada.";
            setTimeout(() => { ball.inPocket = false; ball.x = canvas.width*0.25; ball.y = canvas.height/2; }, 800);
        } else if (ball.type === "black") {
            const myBalls = balls.filter(b => !b.inPocket && b.type === (turn === 1 ? p1Type : (p1Type === 'solid' ? 'stripe' : 'solid'))).length;
            if (myBalls > 0) {
                alert("DERROTA! A bola 8 deve ser a última.");
            } else {
                alert(turn === 1 ? "VITÓRIA DE JOABE PLAY! 🏆" : "BOT MASTER VENCEU!");
            }
            location.reload();
        } else if (!p1Type) {
            p1Type = (turn === 1) ? ball.type : (ball.type === 'solid' ? 'stripe' : 'solid');
            document.getElementById('p1-type').innerText = p1Type === 'solid' ? "LISAS" : "LISTRADAS";
            document.getElementById('p2-type').innerText = p1Type === 'solid' ? "LISTRADAS" : "LISAS";
        }
    }

    function gameLoop() {
        ctx.fillStyle = "#07633a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Desenhar Caçapas
        ctx.fillStyle = "#111";
        pockets.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, ballRadius*2.4, 0, Math.PI*2); ctx.fill(); });

        // Física de Colisão entre bolas
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                let b1 = balls[i], b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                let dx = b2.x - b1.x, dy = b2.y - b1.y;
                let dist = Math.hypot(dx, dy);
                if (dist < b1.radius + b2.radius) {
                    let angle = Math.atan2(dy, dx);
                    let vx1 = b1.vx * Math.cos(angle) + b1.vy * Math.sin(angle);
                    let vy1 = b1.vy * Math.cos(angle) - b1.vx * Math.sin(angle);
                    let vx2 = b2.vx * Math.cos(angle) + b2.vy * Math.sin(angle);
                    let vy2 = b2.vy * Math.cos(angle) - b2.vx * Math.sin(angle);
                    b1.vx = vx2 * Math.cos(angle) - vy1 * Math.sin(angle);
                    b1.vy = vy1 * Math.cos(angle) + vx2 * Math.sin(angle);
                    b2.vx = vx1 * Math.cos(angle) - vy2 * Math.sin(angle);
                    b2.vy = vy2 * Math.cos(angle) + vx1 * Math.sin(angle);
                    let overlap = b1.radius + b2.radius - dist;
                    b1.x -= overlap * Math.cos(angle) * 0.5; b1.y -= overlap * Math.sin(angle) * 0.5;
                    b2.x += overlap * Math.cos(angle) * 0.5; b2.y += overlap * Math.sin(angle) * 0.5;
                }
            }
        }

        let moving = false;
        balls.forEach(b => {
            b.update(); b.draw();
            if (b.vx !== 0 || b.vy !== 0) moving = true;
        });

        if (!moving && isMoving) {
            isMoving = false; turn = turn === 1 ? 2 : 1;
            updateUI();
            if (turn === 2) setTimeout(botThink, 1000);
        }

        if (!moving && turn === 1) drawCue();
        requestAnimationFrame(gameLoop);
    }

    function drawCue() {
        const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
        
        // Linha de Previsão
        ctx.beginPath(); ctx.setLineDash([6, 6]);
        ctx.moveTo(whiteBall.x, whiteBall.y);
        ctx.lineTo(whiteBall.x + Math.cos(angle) * 700, whiteBall.y + Math.sin(angle) * 700);
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke(); ctx.setLineDash([]);

        // Taco PREMIUM
        const offset = whiteBall.radius + 15 + (power * 0.7);
        ctx.save();
        ctx.translate(whiteBall.x, whiteBall.y); ctx.rotate(angle + Math.PI);
        let grad = ctx.createLinearGradient(offset, 0, offset+450, 0);
        grad.addColorStop(0, "#f1c40f"); grad.addColorStop(1, "#3e2a10");
        ctx.fillStyle = grad; ctx.fillRect(offset, -6, 450, 12);
        ctx.restore();
    }

    function updateUI() {
        document.getElementById('p1-card').className = turn === 1 ? "player active" : "player";
        document.getElementById('p2-card').className = turn === 2 ? "player active" : "player";
        log.innerText = turn === 1 ? "Sua vez, Joabe! Planeje sua jogada." : "Bot Master está analisando a mesa...";
    }

    function botThink() {
        const targets = balls.filter(b => !b.inPocket && b.type !== 'white');
        const target = targets[Math.floor(Math.random() * targets.length)];
        const angle = Math.atan2(target.y - whiteBall.y, target.x - whiteBall.x);
        const force = 12 + Math.random() * 8;
        whiteBall.vx = Math.cos(angle) * force;
        whiteBall.vy = Math.sin(angle) * force;
        isMoving = true;
    }

    // --- CONTROLES ---
    window.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
    });
    window.addEventListener('mousedown', () => { if(!isMoving && turn === 1) isCharging = true; });
    window.addEventListener('mouseup', () => {
        if (isCharging) {
            const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
            whiteBall.vx = Math.cos(angle) * (power/4.5);
            whiteBall.vy = Math.sin(angle) * (power/4.5);
            isCharging = false; power = 0; powerFill.style.height = "0%"; isMoving = true;
        }
    });

    setInterval(() => { if(isCharging) { power = Math.min(power+2.2, 100); powerFill.style.height = power+"%"; } }, 16);

    init();
</script>
</body>
</html>
