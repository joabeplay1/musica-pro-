<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>8 BALL POOL | MASTER</title>
    <style>
        :root { --neon: #00ff88; --wood: #2a1b0d; --felt: #074a2e; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; }

        /* Navbar Estilo Imagem */
        header {
            width: 95%; display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 3px; color: #fff; }
        .logo span { display: block; font-size: 10px; color: #c5a059; letter-spacing: 2px; }

        /* Container da Mesa - Maior e Imponente */
        #table-wrap {
            position: relative; padding: 25px; background: var(--wood); 
            border-radius: 20px; box-shadow: 0 40px 100px #000, inset 0 0 50px #000;
            border: 3px solid #1a110a; margin: 20px 0;
        }
        canvas { background: var(--felt); border-radius: 5px; display: block; cursor: crosshair; }

        /* HUD Profissional */
        #hud {
            position: absolute; top: -60px; width: 100%; display: flex; justify-content: space-between;
            font-size: 14px; color: var(--neon); text-transform: uppercase; font-weight: bold;
        }

        /* Barra de Força Lateral */
        #power-box {
            position: absolute; right: -40px; top: 50%; transform: translateY(-50%);
            height: 300px; width: 15px; background: #111; border: 2px solid #333; border-radius: 10px; overflow: hidden;
        }
        #power-bar { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, var(--neon), #ffeb3b, #f00); }

        /* Botão Jogar Funcional */
        #play-btn {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            border: none; padding: 12px 30px; color: white; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #play-btn:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">SINUCA <span>FOCO • PRECISÃO • ESTRATÉGIA</span></div>
        <button id="play-btn" onclick="location.reload()">JOGAR AGORA</button>
        <div style="text-align:right"><div style="font-size:12px">Joabe Play</div><div style="font-size:10px; color:#c5a059">Nível 15</div></div>
    </header>

    <div id="table-wrap">
        <div id="hud">
            <div id="p1-info">VEZ DE: JOABE <span id="p1-type"></span></div>
            <div id="p2-info">BOT MASTER <span id="p2-type"></span></div>
        </div>
        <div id="power-box"><div id="power-bar"></div></div>
        <canvas id="poolCanvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const powerBar = document.getElementById('power-bar');

    // Configurações Físicas
    let ballRadius, whiteBall, balls = [], pockets = [];
    const FRICTION = 0.988;
    const WALL_BOUNCE = 0.7;
    let turn = 1, p1Group = null, isMoving = false, isCharging = false, power = 0;
    let mouseX = 0, mouseY = 0;

    class Ball {
        constructor(x, y, radius, color, num, type) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.num = num; this.type = type;
            this.vx = 0; this.vy = 0; this.inPocket = false;
        }

        draw() {
            if (this.inPocket) return;
            ctx.save();
            // Sombras e Luz Dinâmica
            ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowBlur = 8;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color; ctx.fill();
            
            // Desenho da listra se for Stripe
            if (this.type === 'stripe') {
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.radius, this.radius*0.5, 0, 0, Math.PI*2);
                ctx.fillStyle = "#fff"; ctx.fill();
            }

            // Círculo do número
            if (this.type !== 'white') {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius*0.5, 0, Math.PI*2);
                ctx.fillStyle = "#fff"; ctx.fill();
                ctx.fillStyle = "#000"; ctx.font = `bold ${this.radius*0.7}px Arial`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.num, this.x, this.y);
            }

            // Efeito de Brilho (Igual Miniclip)
            let shine = ctx.createRadialGradient(this.x-this.radius*0.4, this.y-this.radius*0.4, 1, this.x, this.y, this.radius);
            shine.addColorStop(0, "rgba(255,255,255,0.4)"); shine.addColorStop(1, "rgba(0,0,0,0.1)");
            ctx.fillStyle = shine; ctx.fill();
            ctx.restore();
        }

        update() {
            if (this.inPocket) return;
            this.x += this.vx; this.y += this.vy;
            this.vx *= FRICTION; this.vy *= FRICTION;

            // Borda
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.vx *= -WALL_BOUNCE;
                this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
            }
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                this.vy *= -WALL_BOUNCE;
                this.y = this.y < this.radius ? this.radius : canvas.height - this.radius;
            }
            this.checkPocket();
        }

        checkPocket() {
            pockets.forEach(p => {
                const dist = Math.hypot(this.x - p.x, this.y - p.y);
                // SE A BOLA CHEGAR PERTO, ELA CAI (CORREÇÃO DO BUG)
                if (dist < ballRadius * 2.1) {
                    this.vx += (p.x - this.x) * 0.2; // Sucção
                    this.vy += (p.y - this.y) * 0.2;
                }
                if (dist < ballRadius * 1.5) {
                    this.inPocket = true; this.vx = 0; this.vy = 0;
                    handleRules(this);
                }
            });
        }
    }

    function init() {
        const w = Math.min(window.innerWidth * 0.82, 1050);
        canvas.width = w; canvas.height = w / 2;
        ballRadius = canvas.width * 0.021; // Bolas GRANDES

        pockets = [
            {x:0, y:0}, {x:canvas.width/2, y:0}, {x:canvas.width, y:0},
            {x:0, y:canvas.height}, {x:canvas.width/2, y:canvas.height}, {x:canvas.width, y:canvas.height}
        ];

        setupBalls();
        requestAnimationFrame(gameLoop);
    }

    function setupBalls() {
        balls = [];
        whiteBall = new Ball(canvas.width*0.25, canvas.height/2, ballRadius, "#fff", 0, "white");
        balls.push(whiteBall);

        const colors = ["#f1c40f", "#2980b9", "#e74c3c", "#8e44ad", "#d35400", "#27ae60", "#c0392b", "#333"];
        let count = 1;
        const startX = canvas.width * 0.7, startY = canvas.height/2;

        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                let type = (count === 8) ? "black" : (count <= 7 ? "solid" : "stripe");
                let color = (count === 8) ? "#000" : colors[(count-1) % 7];
                balls.push(new Ball(startX + (i*ballRadius*1.78), startY + (j*ballRadius*2.05) - (i*ballRadius), ballRadius, color, count, type));
                count++;
            }
        }
    }

    function handleRules(ball) {
        if (ball.type === "white") {
            setTimeout(() => { ball.inPocket = false; ball.x = canvas.width*0.25; ball.y = canvas.height/2; }, 800);
        } else if (ball.type === "black") {
            const rem = balls.filter(b => !b.inPocket && b.type !== 'white' && b.type !== 'black').length;
            if (rem > 0) alert("DERROTA! Bola 8 antes da hora.");
            else alert(turn === 1 ? "JOABE VENCEU! 🏆" : "BOT VENCEU!");
            location.reload();
        } else if (!p1Group) {
            p1Group = (turn === 1) ? ball.type : (ball.type === 'solid' ? 'stripe' : 'solid');
            document.getElementById('p1-type').innerText = `(${p1Group === 'solid' ? 'LISAS' : 'LISTRADAS'})`;
        }
    }

    function gameLoop() {
        ctx.fillStyle = "#074a2e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Efeito de Luz Central (Igual foto)
        let light = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, canvas.width*0.6);
        light.addColorStop(0, "rgba(255,255,255,0.05)"); light.addColorStop(1, "transparent");
        ctx.fillStyle = light; ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "#000";
        pockets.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, ballRadius*2.3, 0, Math.PI*2); ctx.fill(); });

        // Colisões
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                let b1 = balls[i], b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                let dx = b2.x - b1.x, dy = b2.y - b1.y;
                let dist = Math.hypot(dx, dy);
                if (dist < b1.radius + b2.radius) {
                    let angle = Math.atan2(dy, dx);
                    let vx1 = b1.vx * Math.cos(angle) + b1.vy * Math.sin(angle);
                    let vy1 = b1.vy * Math.cos(angle) - b1.vx * Math.sin(angle);
                    let vx2 = b2.vx * Math.cos(angle) + b2.vy * Math.sin(angle);
                    let vy2 = b2.vy * Math.cos(angle) - b2.vx * Math.sin(angle);
                    b1.vx = vx2 * Math.cos(angle) - vy1 * Math.sin(angle);
                    b1.vy = vy1 * Math.cos(angle) + vx2 * Math.sin(angle);
                    b2.vx = vx1 * Math.cos(angle) - vy2 * Math.sin(angle);
                    b2.vy = vy2 * Math.cos(angle) + vx1 * Math.sin(angle);
                    let overlap = b1.radius + b2.radius - dist;
                    b1.x -= overlap * Math.cos(angle) * 0.5; b1.y -= overlap * Math.sin(angle) * 0.5;
                    b2.x += overlap * Math.cos(angle) * 0.5; b2.y += overlap * Math.sin(angle) * 0.5;
                }
            }
        }

        let moving = false;
        balls.forEach(b => {
            b.update(); b.draw();
            if (b.vx !== 0 || b.vy !== 0) moving = true;
        });

        if (!moving && isMoving) {
            isMoving = false; turn = turn === 1 ? 2 : 1;
            updateHUD();
            if (turn === 2) setTimeout(botDecision, 1200);
        }

        if (!moving && turn === 1) drawCue();
        requestAnimationFrame(gameLoop);
    }

    function drawCue() {
        const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
        // MIRA REFINADA
        ctx.beginPath(); ctx.setLineDash([5, 5]);
        ctx.moveTo(whiteBall.x, whiteBall.y);
        ctx.lineTo(whiteBall.x + Math.cos(angle) * 700, whiteBall.y + Math.sin(angle) * 700);
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke(); ctx.setLineDash([]);

        // TACO PREMIUM (Animação de puxar)
        const offset = whiteBall.radius + 15 + (power * 0.8);
        ctx.save();
        ctx.translate(whiteBall.x, whiteBall.y); ctx.rotate(angle + Math.PI);
        let grad = ctx.createLinearGradient(offset, 0, offset+450, 0);
        grad.addColorStop(0, "#f1c40f"); grad.addColorStop(1, "#3e2a10");
        ctx.fillStyle = grad; ctx.fillRect(offset, -6, 450, 12);
        ctx.restore();
    }

    function botDecision() {
        const target = balls.find(b => !b.inPocket && b.type !== 'white');
        const angle = Math.atan2(target.y - whiteBall.y, target.x - whiteBall.x);
        whiteBall.vx = Math.cos(angle) * 15;
        whiteBall.vy = Math.sin(angle) * 15;
        isMoving = true;
    }

    function updateHUD() {
        document.getElementById('p1-info').style.color = (turn === 1) ? "var(--neon)" : "#555";
        document.getElementById('p2-info').style.color = (turn === 2) ? "var(--neon)" : "#555";
    }

    // CONTROLES
    window.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
    });
    window.addEventListener('mousedown', () => { if(!isMoving && turn === 1) isCharging = true; });
    window.addEventListener('mouseup', () => {
        if (isCharging) {
            const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
            whiteBall.vx = Math.cos(angle) * (power/4.5);
            whiteBall.vy = Math.sin(angle) * (power/4.5);
            isCharging = false; power = 0; powerBar.style.height = "0%"; isMoving = true;
        }
    });

    setInterval(() => { if(isCharging) { power = Math.min(power+2.2, 100); powerBar.style.height = power+"%"; } }, 16);
    init();
</script>
</body>
</html>
