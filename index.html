<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePlay 8 Ball Pool | PREMIUM | Joabe Play</title>
    <style>
        :root { 
            --neon-green: #00ff88; 
            --wood: #3e2a1c;
            --felt: #07633a;
            --bg: #0a0a0a;
        }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; color: white; user-select: none; }
        
        #game-wrapper { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw; }

        /* HUD Premium */
        #status-bar {
            width: 80%; max-width: 900px; background: rgba(20,20,20,0.95); padding: 15px 25px;
            border-radius: 15px; border: 1px solid #333; margin-bottom: 15px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .player-info { padding: 10px 25px; border-radius: 10px; transition: 0.4s; text-align: center; border: 2px solid transparent; }
        .active-turn { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,136,0.4); background: rgba(0,255,136,0.1); }
        .player-name { font-weight: bold; font-size: 1.1em; }
        .ball-type-icon { font-size: 0.8em; opacity: 0.8; margin-top: 4px; }

        #vs-badge { font-size: 1.5em; font-weight: 900; color: #555; font-style: italic; }

        /* Container da Mesa com Borda de Madeira */
        #table-container {
            position: relative;
            padding: 25px; /* Tamanho da borda de madeira */
            background: var(--wood);
            border-radius: 15px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.7);
        }

        canvas { 
            background: var(--felt); 
            cursor: crosshair; 
            display: block;
            border-radius: 5px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        /* Barra de Força Minimalista */
        #power-meter {
            position: absolute; right: -40px; top: 50%; transform: translateY(-50%);
            height: 250px; width: 12px;
            background: #1a1a1a; border: 1px solid #333; border-radius: 10px; overflow: hidden;
        }
        #power-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, var(--neon-green), #ffeb3b, #ff3300); transition: height 0.1s linear; }

        #game-log { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="status-bar">
        <div id="p1-box" class="player-info active-turn">
            <div class="player-name">👤 JOABE PLAY</div>
            <div id="p1-type" class="ball-type-icon">Bolas: ?</div>
        </div>
        <div id="vs-badge">VS</div>
        <div id="p2-box" class="player-info">
            <div class="player-name">🤖 BOT PRO</div>
            <div id="p2-type" class="ball-type-icon">Bolas: ?</div>
        </div>
    </div>

    <div id="table-container">
        <div id="power-meter"><div id="power-fill"></div></div>
        <canvas id="poolCanvas"></canvas>
    </div>
    
    <div id="game-log">Aguardando tacada...</div>
</div>

<script>
    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const powerFill = document.getElementById('power-fill');
    const log = document.getElementById('game-log');

    // --- CONFIGURAÇÕES GRÁFICAS & FÍSICAS ---
    const FRICTION = 0.986; // Pano rápido premium
    const WALL_BOUNCE = 0.75; 
    const BALL_RADIUS_RATIO = 0.017; // Mantendo bolas grandes
    let ballRadius, whiteBall, balls = [];
    let pockets = [];
    let isCharging = false, power = 0, mouseX, mouseY;
    let turn = 1; // 1 = Joabe, 2 = Bot
    let gameState = "aiming"; // aiming, moving
    let p1Type = null, p2Type = null;

    class Ball {
        constructor(x, y, radius, color, number, type) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.number = number;
            this.type = type; // white, solid, stripe, black
            this.velX = 0; this.velY = 0;
            this.inPocket = false;
            this.pocketAnim = 1; // Para animação de cair
        }

        draw() {
            if (this.inPocket && this.pocketAnim <= 0) return;
            
            ctx.save();
            if (this.inPocket) { // Animação de encolher ao cair
                this.pocketAnim -= 0.1;
                ctx.translate(this.x, this.y);
                ctx.scale(this.pocketAnim, this.pocketAnim);
                ctx.translate(-this.x, -this.y);
                ctx.globalAlpha = this.pocketAnim;
            }

            // 1. Sombra Projetada no Pano
            ctx.beginPath();
            ctx.arc(this.x + this.radius*0.2, this.y + this.radius*0.2, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.fill();

            // 2. Corpo da Bola (Base Color)
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();

            // 3. Visual Moderno: Faixa (Stripes)
            if (this.type === 'stripe') {
                ctx.beginPath();
                // Faixa branca rotacionada levemente para dar dinamismo
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.5, Math.PI/4, 0, Math.PI * 2);
                ctx.fillStyle = "#fff";
                ctx.fill();
            }

            // 4. Círculo do Número (Área Branca)
            if (this.type !== 'white') {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.55, 0, Math.PI * 2);
                ctx.fillStyle = "#fff";
                ctx.fill();
                
                // Número (Preto)
                ctx.fillStyle = "#000";
                ctx.font = `bold ${this.radius * 0.9}px 'Arial Condensed', sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.number, this.x, this.y + this.radius*0.05);
            }

            // 5. Visual Moderno PREMIUM: Brilho Esférico (Highlight)
            let highlight = ctx.createRadialGradient(
                this.x - this.radius*0.4, this.y - this.radius*0.4, 1,
                this.x, this.y, this.radius
            );
            highlight.addColorStop(0, 'rgba(255, 255, 255, 0.6)'); // Ponto de luz forte
            highlight.addColorStop(0.3, 'rgba(255, 255, 255, 0.1)');
            highlight.addColorStop(1, 'rgba(0, 0, 0, 0.3)'); // Sombra na borda oposta

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = highlight;
            ctx.fill();

            ctx.restore();
        }

        update() {
            if (this.inPocket) return;
            this.x += this.velX; this.y += this.velY;
            this.velX *= FRICTION; this.velY *= FRICTION;

            // Parada suave
            if (Math.abs(this.velX) < 0.08) this.velX = 0;
            if (Math.abs(this.velY) < 0.08) this.velY = 0;

            // Rebote nas Bordas
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.velX *= -WALL_BOUNCE;
                this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
            }
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                this.velY *= -WALL_BOUNCE;
                this.y = this.y < this.radius ? this.radius : canvas.height - this.radius;
            }
            this.checkPocket();
        }

        checkPocket() {
            pockets.forEach(p => {
                // Caçapa 'puxa' a bola se estiver perto
                let dist = Math.hypot(this.x - p.x, this.y - p.y);
                if (dist < ballRadius * 1.8) {
                    this.velX += (p.x - this.x) * 0.1;
                    this.velY += (p.y - this.y) * 0.1;
                }
                // Caiu
                if (dist < ballRadius * 1.2) {
                    this.inPocket = true;
                    this.velX = 0; this.velY = 0;
                    handlePocketed(this);
                }
            });
        }
    }

    function init() {
        // Redimensionamento mantendo proporção 2:1 grande
        const w = Math.min(window.innerWidth * 0.85, 1000);
        canvas.width = w; canvas.height = w / 2;
        ballRadius = canvas.width * BALL_RADIUS_RATIO;
        
        // Definir Caçapas (Buracos Visíveis)
        const pr = ballRadius * 2.2; // Raio da caçapa
        pockets = [
            {x: 0, y: 0}, {x: canvas.width/2, y: -ballRadius*0.5}, {x: canvas.width, y: 0},
            {x: 0, y: canvas.height}, {x: canvas.width/2, y: canvas.height+ballRadius*0.5}, {x: canvas.width, y: canvas.height}
        ];

        resetTable();
        requestAnimationFrame(loop);
    }

    function drawPockets() {
        ctx.save();
        pockets.forEach(p => {
            // Sombra interna profunda
            ctx.beginPath();
            ctx.arc(p.x, p.y, ballRadius * 2.2, 0, Math.PI * 2);
            ctx.fillStyle = "#000"; // Fundo preto total
            ctx.fill();
            
            // Borda cromada/escura da caçapa
            ctx.beginPath();
            ctx.arc(p.x, p.y, ballRadius * 2.2, 0, Math.PI * 2);
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#1a1a1a";
            ctx.stroke();
        });
        ctx.restore();
    }

    function resetTable() {
        balls = [];
        whiteBall = new Ball(canvas.width * 0.25, canvas.height/2, ballRadius, "#fff", 0, "white");
        balls.push(whiteBall);

        // Rack Oficial Premium
        const startX = canvas.width * 0.7;
        const startY = canvas.height / 2;
        // Cores OFICIAIS do 8 Ball Pool
        const colors = [
            "#f1c40f", // 1 Amarelo
            "#2980b9", // 2 Azul
            "#e74c3c", // 3 Vermelho
            "#8e44ad", // 4 Roxo
            "#d35400", // 5 Laranja
            "#27ae60", // 6 Verde
            "#c0392b", // 7 Vinho
            "#000000"  // 8 Preto (Black)
        ];
        
        let count = 1;
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                let type = count <= 7 ? "solid" : (count === 8 ? "black" : "stripe");
                let color = count === 8 ? "#000" : colors[(count-1) % 7];
                balls.push(new Ball(
                    startX + (i * ballRadius * 1.78),
                    startY + (j * ballRadius * 2.02) - (i * ballRadius * 1.01),
                    ballRadius, color, count, type
                ));
                count++;
            }
        }
    }

    // --- FÍSICA DE COLISÃO ELÁSTICA PREMIUM ---
    function resolveCollisions() {
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                let b1 = balls[i], b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                let dx = b2.x - b1.x, dy = b2.y - b1.y;
                let dist = Math.hypot(dx, dy);
                if (dist < b1.radius + b2.radius) {
                    let angle = Math.atan2(dy, dx);
                    let sin = Math.sin(angle), cos = Math.cos(angle);
                    // Rotação
                    let vx1 = b1.velX * cos + b1.velY * sin;
                    let vy1 = b1.velY * cos - b1.velX * sin;
                    let vx2 = b2.velX * cos + b2.velY * sin;
                    let vy2 = b2.velY * cos - b2.velX * sin;
                    // Troca de velocidade elástica
                    let vxTotal = vx1 - vx2;
                    vx1 = vx2; vx2 = vxTotal + vx1; 
                    // Voltar
                    b1.velX = vx1 * cos - vy1 * sin; b1.velY = vy1 * cos + vx1 * sin;
                    b2.velX = vx2 * cos - vy2 * sin; b2.velY = vy2 * cos + vx2 * sin;
                    // Correção de sobreposição
                    let overlap = (b1.radius + b2.radius - dist) / 2;
                    b1.x -= overlap * cos; b1.y -= overlap * sin;
                    b2.x += overlap * cos; b2.y += overlap * sin;
                }
            }
        }
    }

    function loop() {
        // Limpar pano com efeito de profundidade
        ctx.fillStyle = "#07633a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawPockets(); // Desenhar buracos primeiro (bolas passam por cima)
        resolveCollisions();
        
        let moving = false;
        balls.forEach(b => {
            b.update();
            b.draw();
            if (Math.abs(b.velX) > 0 || Math.abs(b.velY) > 0) moving = true;
        });

        // Gerenciamento de Turno
        if (!moving && gameState === "moving") {
            gameState = "aiming";
            turn = turn === 1 ? 2 : 1;
            updateUI();
            if (turn === 2) setTimeout(botMove, 1200);
        }

        // Desenhar Taco (atrás da bola) se estiver mirando
        if (gameState === "aiming" && turn === 1) drawCue();

        requestAnimationFrame(loop);
    }

    function drawCue() {
        const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
        
        // 1. Linha de Mira Premium (Tracejada Longa)
        ctx.beginPath(); ctx.setLineDash([8, 8]);
        ctx.moveTo(whiteBall.x, whiteBall.y);
        ctx.lineTo(whiteBall.x + Math.cos(angle) * 800, whiteBall.y + Math.sin(angle) * 800);
        ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 2;
        ctx.stroke(); ctx.setLineDash([]);

        // 2. Taco PREMIUM Visível
        // Animação do taco indo pra trás baseado na força (power)
        const cuePullBack = whiteBall.radius + 15 + (power * 0.8);
        const cueLength = canvas.width * 0.45; // Taco longo e imponente
        const cueWidth = ballRadius * 0.5;

        ctx.save();
        ctx.translate(whiteBall.x, whiteBall.y);
        ctx.rotate(angle + Math.PI); // Aponta para o mouse

        // Degradê de Madeira Premium no Taco
        let cueGrad = ctx.createLinearGradient(cuePullBack, 0, cuePullBack + cueLength, 0);
        cueGrad.addColorStop(0, '#f3e5ab'); // Ponta clara (Giz)
        cueGrad.addColorStop(0.02, '#fff'); // Virola branca
        cueGrad.addColorStop(0.05, '#5d3a1a'); // Madeira clara
        cueGrad.addColorStop(1, '#2c1e14');   // Cabo escuro premium

        ctx.beginPath();
        ctx.moveTo(cuePullBack, -cueWidth/2);
        ctx.lineTo(cuePullBack + cueLength, -cueWidth); // Engrossa em direção ao cabo
        ctx.lineTo(cuePullBack + cueLength, cueWidth);
        ctx.lineTo(cuePullBack, cueWidth/2);
        ctx.closePath();
        
        ctx.fillStyle = cueGrad;
        ctx.fill();
        
        // Sombra Projetada do Taco
        ctx.shadowColor = "rgba(0,0,0,0.4)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 5;
        
        ctx.restore();
    }

    // --- REGRAS & LOGICA ---
    function handlePocketed(ball) {
        if (ball.type === "white") {
            log.innerText = "FALTA! Branca na caçapa.";
            ball.pocketAnim = 1; // Reseta anim para reaparecer
            setTimeout(() => { 
                ball.inPocket = false; ball.x = canvas.width * 0.25; ball.y = canvas.height/2; 
            }, 800);
        } else if (ball.type === "black") {
            alert(turn === 1 ? "🎉 JOABE VENCEU!" : "🤖 BOT VENCEU!");
            resetTable();
        } else {
            log.innerText = `Bola ${ball.number} (${ball.type}) encaçapada.`;
        }
    }

    function updateUI() {
        document.getElementById('p1-box').className = turn === 1 ? "player-info active-turn" : "player-info";
        document.getElementById('p2-box').className = turn === 2 ? "player-info active-turn" : "player-info";
        log.innerText = turn === 1 ? "Sua vez, Joabe! Mira e atira." : "Bot Pro pensando na jogada...";
    }

    function botMove() {
        if (gameState !== "aiming") return;
        // IA Simples: Acha a primeira bola disponível
        const target = balls.find(b => !b.inPocket && b.type !== "white" && b.type !== "black");
        if(!target) return;
        const angle = Math.atan2(target.y - whiteBall.y, target.x - whiteBall.x);
        const botPower = 20 + Math.random() * 15;
        
        // Simula o 'puxar' do taco do bot visualmente
        power = 50; powerFill.style.height = '50%';
        
        setTimeout(() => {
            power = 0; powerFill.style.height = '0%';
            whiteBall.velX = Math.cos(angle) * botPower;
            whiteBall.velY = Math.sin(angle) * botPower;
            gameState = "moving";
        }, 800);
    }

    // --- INTERAÇÕES MOUSE/TOUCH ---
    window.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
    });
    window.addEventListener('mousedown', () => { if(turn === 1 && gameState === "aiming") isCharging = true; });
    window.addEventListener('mouseup', () => {
        if (isCharging) {
            const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
            whiteBall.velX = Math.cos(angle) * (power/4.5);
            whiteBall.velY = Math.sin(angle) * (power/4.5);
            isCharging = false; power = 0; powerFill.style.height = '0%';
            gameState = "moving";
        }
    });

    // Loop de carregamento da força
    setInterval(() => { if(isCharging) { power = Math.min(power+2, 100); powerFill.style.height = power+'%'; } }, 16);

    window.addEventListener('resize', init);
    init();
</script>
</body>
</html>
